<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>机器人租赁 · 微信小程序原型</title>
  <style>
    :root{--p:#165dff;--ph:#4080ff;--t1:#1d2129;--t2:#4e5969;--t3:#86909c;--b:#e5e6eb;--f:#f7f8fa;--f2:#f2f3f5;--s:#00b42a;--w:#ff7d00;--d:#f53f3f;--font:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#eef2f8;color:var(--t1);font:14px/1.57 var(--font);display:grid;place-items:center}button,input{font:inherit}button{cursor:pointer}
    .stage{display:flex;gap:28px;align-items:flex-start}.phone{width:390px;height:844px;border-radius:34px;background:#111;padding:10px;box-shadow:0 20px 60px rgba(29,33,41,.22)}.screen{height:100%;border-radius:26px;overflow:hidden;background:var(--f);position:relative}.status{height:34px;background:#fff;display:flex;align-items:end;justify-content:space-between;padding:0 18px 6px;font-size:12px;font-weight:600}.capsule{width:88px;height:30px;border:1px solid #dcdfe6;border-radius:999px;background:#fff;position:absolute;right:12px;top:42px;display:flex;align-items:center;justify-content:space-around;color:#222;z-index:4}.nav{height:54px;background:#fff;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--b);z-index:3}.back{position:absolute;left:12px;width:36px;height:36px;border:0;background:transparent;font-size:22px}.title{font-weight:600;font-size:17px}.content{position:absolute;left:0;right:0;top:88px;bottom:78px;overflow:auto;padding:14px}.content.nofoot{bottom:0}.bottom{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--b);padding:10px 16px 22px;display:flex;gap:12px;align-items:center}.btn{height:44px;border:1px solid var(--b);border-radius:10px;background:#fff;color:var(--t1);padding:0 16px}.btn.p{border-color:var(--p);background:var(--p);color:#fff;box-shadow:inset 0 1px rgba(255,255,255,.25)}.btn.full{width:100%}.price{font-size:20px;font-weight:700;color:var(--p)}.card{background:#fff;border:1px solid var(--b);border-radius:16px;padding:14px;margin-bottom:12px}.hero{height:178px;border-radius:18px;background:radial-gradient(circle at 24% 22%,#d8e8ff,transparent 36%),linear-gradient(135deg,#eef6ff,#c9ddff);display:flex;align-items:center;justify-content:center;font-size:76px;margin-bottom:12px}.robot-card{display:flex;gap:12px}.thumb{width:88px;height:78px;border-radius:14px;background:linear-gradient(135deg,#e8f3ff,#bedaff);display:grid;place-items:center;font-size:38px;flex:none}.name{font-size:16px;font-weight:600}.muted{color:var(--t3);font-size:12px}.tag{display:inline-flex;height:22px;align-items:center;padding:0 8px;border-radius:999px;background:rgba(22,93,255,.1);color:var(--p);font-size:12px;margin-right:4px}.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.seg button{height:42px;border:1px solid var(--b);background:#fff;border-radius:12px}.seg button.on{border-color:var(--p);background:rgba(22,93,255,.08);color:var(--p);font-weight:600}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:10px}.day{height:38px;border:1px solid var(--b);border-radius:10px;background:#fff;display:grid;place-items:center}.day.sel{border-color:var(--p);background:var(--p);color:#fff}.day.off{background:var(--f2);color:var(--t3);text-decoration:line-through}.day.busy{background:rgba(255,125,0,.12);border-color:#ffcf8b;color:#b25e00}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0}.state{font-weight:600}.state.wait{color:var(--w)}.state.run{color:var(--p)}.state.cancel{color:var(--d)}.timeline{border-left:2px solid var(--b);padding-left:14px;margin-left:6px}.tl{margin-bottom:12px;position:relative}.tl:before{content:"";position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--p)}.empty{text-align:center;padding:50px 20px;color:var(--t3)}.hidden{display:none}.toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%);background:rgba(29,33,41,.88);color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;display:none;z-index:10}.toast.show{display:block}.sheet-mask{position:absolute;inset:0;background:rgba(29,33,41,.45);display:none;z-index:8}.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 28px;transform:translateY(100%);transition:.2s;z-index:9}.sheet-mask.show{display:block}.sheet.show{transform:none}.console{width:330px;background:#fff;border:1px solid var(--b);border-radius:16px;padding:18px;box-shadow:0 12px 36px rgba(29,33,41,.1)}.console h3{margin:0 0 12px}.console .btn{width:100%;margin-bottom:8px;text-align:left}.pill{height:28px;border-radius:999px;background:var(--f2);display:inline-flex;align-items:center;padding:0 10px;color:var(--t2);font-size:12px}.count{font-variant-numeric:tabular-nums;color:var(--w);font-weight:600}
  </style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="status"><span>9:41</span><span>5G 100%</span></div>
        <div class="capsule"><span>···</span><span>○</span></div>
        <div class="nav"><button class="back" onclick="goBack()">‹</button><div class="title" id="title">机器人租赁</div></div>
        <main class="content" id="content"></main>
        <div class="bottom" id="bottom"></div>
        <div class="toast" id="toast">已更新</div>
        <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
        <div class="sheet" id="sheet"></div>
      </div>
    </div>
    <aside class="console">
      <h3>原型控制台</h3>
      <button class="btn" onclick="render('list')">机器人列表</button>
      <button class="btn" onclick="render('detail')">机器人详情</button>
      <button class="btn" onclick="render('confirm')">下单确认（日租禁选）</button>
      <button class="btn" onclick="render('result')">支付成功结果</button>
      <button class="btn" onclick="render('orders')">我的租赁订单</button>
      <button class="btn" onclick="render('orderDetail')">订单详情/取消</button>
      <button class="btn" onclick="render('empty')">空态</button>
      <button class="btn" onclick="showToast('网络异常，请稍后重试')">错误态 Toast</button>
    </aside>
  </div>
  <script>
    const content=document.getElementById('content'),bottom=document.getElementById('bottom'),title=document.getElementById('title');
    let page='list',rentType='day';
    const history=[];
    function setPage(name,html,foot='',nofoot=false){page=name;title.textContent={list:'机器人租赁',detail:'机器人详情',confirm:'确认租赁',result:'支付结果',orders:'我的租赁订单',orderDetail:'订单详情',empty:'机器人租赁'}[name]||'机器人租赁';content.classList.toggle('nofoot',nofoot);content.innerHTML=html;bottom.innerHTML=foot;bottom.style.display=foot?'flex':'none'}
    function render(p){history.push(page);if(p==='list')setPage('list',listHtml(),`<button class="btn full" onclick="render('orders')">查看我的租赁订单</button>`);if(p==='detail')setPage('detail',detailHtml(),`<button class="btn full p" onclick="render('confirm')">立即租赁</button>`);if(p==='confirm')setPage('confirm',confirmHtml(),`<div><div class="muted">合计</div><div class="price">¥540.00</div></div><button class="btn p" style="flex:1" onclick="render('result')">立即支付</button>`);if(p==='result')setPage('result',resultHtml(),`<button class="btn" onclick="render('list')">返回列表</button><button class="btn p" style="flex:1" onclick="render('orderDetail')">查看订单</button>`);if(p==='orders')setPage('orders',ordersHtml(),'',true);if(p==='orderDetail')setPage('orderDetail',orderDetailHtml(),`<button class="btn" onclick="openCancel()">取消订单</button><button class="btn p" style="flex:1" onclick="showToast('已联系平台客服')">联系客服</button>`);if(p==='empty')setPage('empty',`<div class="empty">🤖<br><br>暂无可租赁机器人<br><span class="muted">请稍后下拉刷新或联系客服</span></div>`,'',true)}
    function listHtml(){return `<div class="card robot-card" onclick="render('detail')"><div class="thumb">🤖</div><div style="flex:1"><div class="name">智能接待机器人 A1</div><div class="muted">适用于展厅接待、客户引导、基础问答</div><div style="margin:8px 0"><span class="tag">展厅接待</span><span class="tag">客户引导</span></div><div><b style="color:#165dff">¥180/日</b><span class="muted"> ｜ ¥3200/月</span></div></div></div><div class="card robot-card"><div class="thumb">🦾</div><div style="flex:1"><div class="name">巡检服务机器人 X6</div><div class="muted">可用于店内路线巡检与迎宾讲解</div><div style="margin:8px 0"><span class="tag">巡检</span><span class="tag">讲解</span></div><div><b style="color:#165dff">¥260/日</b><span class="muted"> ｜ ¥4600/月</span></div></div></div>`}
    function detailHtml(){return `<div class="hero">🤖</div><div class="card"><div class="name">智能接待机器人 A1</div><div style="margin:8px 0"><span class="tag">展厅接待</span><span class="tag">客户引导</span></div><div class="row"><span>日租价</span><b>¥180.00/日</b></div><div class="row"><span>月租价</span><b>¥3200.00/月</b></div></div><div class="card"><b>机器人介绍</b><p class="muted">适用于汽车后市场展厅接待、客户指引和基础问答，支持语音互动、路线引导和活动介绍。</p></div><div class="card"><b>租赁说明</b><p class="muted">选择租赁时间并在线支付后，订单进入待确认；后台确认后进入租赁中。不可租和已租时间不可选择。</p></div>`}
    function confirmHtml(){return `<div class="card robot-card"><div class="thumb">🤖</div><div><div class="name">智能接待机器人 A1</div><div class="muted">日租 ¥180.00 ｜ 月租 ¥3200.00</div></div></div><div class="card"><div class="seg"><button class="${rentType==='day'?'on':''}" onclick="rentType='day';render('confirm')">日租</button><button class="${rentType==='month'?'on':''}" onclick="rentType='month';render('confirm')">月租</button></div></div>${rentType==='day'?dayPicker():monthPicker()}<div class="card"><div class="row"><span>租赁时长</span><b>${rentType==='day'?'3 天':'3 个月'}</b></div><div class="row"><span>计价方式</span><span>${rentType==='day'?'¥180.00 × 3 天':'¥3200.00 × 3 个月'}</span></div><div class="row"><span>订单金额</span><b class="price">${rentType==='day'?'¥540.00':'¥9600.00'}</b></div><div class="muted">橙色/灰色日期表示后台不可租赁或已租配置，无法选择。</div></div>`}
    function dayPicker(){let days='';for(let i=15;i<=28;i++){let cls=[18,19,20].includes(i)?'sel':([22,23,24,26].includes(i)?'busy':'');days+=`<div class="day ${cls}">${i}</div>`}return `<div class="card"><div class="row"><b>选择租赁日期</b><span class="pill">5 月</span></div><div class="calendar">${days}</div></div>`}
    function monthPicker(){return `<div class="card"><div class="row"><b>选择租赁月份</b><span class="pill">整月租赁</span></div><div class="calendar">${['5月','6月','7月','8月','9月','10月','11月','12月'].map((m,i)=>`<div class="day ${i>0&&i<4?'sel':i===5?'busy':''}">${m}</div>`).join('')}</div></div>`}
    function resultHtml(){return `<div class="card" style="text-align:center;padding:38px 18px"><div style="font-size:58px;color:#00b42a">✓</div><h2>支付成功</h2><p class="muted">订单已支付成功，等待平台确认租赁安排。</p></div><div class="card"><div class="row"><span>机器人</span><b>智能接待机器人 A1</b></div><div class="row"><span>租赁时间</span><span>2026-05-18 至 2026-05-20</span></div><div class="row"><span>支付金额</span><b>¥540.00</b></div></div>`}
    function ordersHtml(){return `<div class="row" style="padding:0 2px 8px"><span class="pill">全部</span><span class="pill">待支付</span><span class="pill">待确认</span><span class="pill">租赁中</span></div><div class="card" onclick="render('orderDetail')"><div class="row"><b>智能接待机器人 A1</b><span class="state wait">待确认</span></div><div class="muted">日租｜2026-05-18 至 2026-05-20</div><div class="row"><span>实付金额</span><b>¥540.00</b></div><button class="btn" onclick="event.stopPropagation();openCancel()">取消订单</button></div><div class="card"><div class="row"><b>巡检服务机器人 X6</b><span class="state run">租赁中</span></div><div class="muted">月租｜2026-06 至 2026-07</div><div class="row"><span>实付金额</span><b>¥9200.00</b></div></div><div class="card"><div class="row"><b>智能接待机器人 A1</b><span class="state wait">待支付</span></div><div class="muted">请在 <span class="count">08:32</span> 内完成支付</div><div class="row"><button class="btn" onclick="openCancel()">取消订单</button><button class="btn p">继续支付</button></div></div>`}
    function orderDetailHtml(){return `<div class="card"><div class="row"><span>订单状态</span><b class="state wait">待确认</b></div><p class="muted">已支付成功，平台正在确认租赁安排。待确认订单可取消，取消后进入统一售后处理流程。</p></div><div class="card"><div class="row"><span>订单编号</span><b>RO20260514001</b></div><div class="row"><span>机器人</span><span>智能接待机器人 A1</span></div><div class="row"><span>租赁方式</span><span>日租</span></div><div class="row"><span>租赁时间</span><span>2026-05-18 至 2026-05-20</span></div><div class="row"><span>订单金额</span><b>¥540.00</b></div></div><div class="card"><b>订单进度</b><div class="timeline"><div class="tl">14:21 提交订单</div><div class="tl">14:24 微信支付成功</div><div class="tl">等待平台确认</div></div></div>`}
    function openCancel(){sheetMask.classList.add('show');sheet.classList.add('show');sheet.innerHTML=`<h3 style="margin-top:0">取消订单</h3><p class="muted">待支付订单取消后直接关闭；待确认订单取消后如已支付，将进入平台统一售后处理流程。</p><div class="card"><div class="row"><span>取消原因</span><b>客户取消</b></div></div><button class="btn p full" onclick="closeSheet();showToast('订单已取消')">确认取消</button><button class="btn full" style="margin-top:8px" onclick="closeSheet()">暂不取消</button>`}
    function closeSheet(){sheetMask.classList.remove('show');sheet.classList.remove('show')}
    function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1600)}
    function goBack(){history.pop();render(history.pop()||'list')}
    render('list');
  </script>
</body>
</html>
