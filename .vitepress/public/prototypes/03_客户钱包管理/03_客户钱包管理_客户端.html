<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客户钱包管理 - 客户端原型</title>
  <style>
    :root {
      --color-primary-6: #165dff;
      --color-primary-1: #e8f3ff;
      --color-text-1: #1d2129;
      --color-text-2: #4e5969;
      --color-text-3: #86909c;
      --color-border-1: #e5e6eb;
      --color-fill-1: #f7f8fa;
      --color-fill-2: #f2f3f5;
      --color-bg-1: #ffffff;
      --color-success-6: #00b42a;
      --color-warning-6: #ff7d00;
      --color-danger-6: #f53f3f;
      --wallet-red: #fa5f6a;
      --wallet-orange: #ff5b16;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow-card: 0 10px 28px rgba(29, 33, 41, 0.08);
      --shadow-popup: 0 18px 48px rgba(29, 33, 41, 0.22);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f7f8fa 0%, #eef3ff 100%);
      color: var(--color-text-1);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: none; }

    .stage {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    .phone {
      width: 390px;
      height: 844px;
      border: 10px solid #111;
      border-radius: 48px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(29, 33, 41, 0.28);
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 20;
      pointer-events: none;
    }

    .app {
      height: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-fill-1);
    }

    .status-bar {
      height: 36px;
      padding: 10px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      position: relative;
      z-index: 5;
    }

    .status-icons { display: flex; align-items: center; gap: 5px; color: #111; }
    .signal { display: flex; gap: 2px; align-items: end; }
    .signal span { width: 3px; background: #111; border-radius: 2px; }
    .signal span:nth-child(1) { height: 5px; }
    .signal span:nth-child(2) { height: 8px; }
    .signal span:nth-child(3) { height: 11px; }
    .wifi { width: 14px; height: 10px; border: 2px solid #111; border-bottom: none; border-radius: 14px 14px 0 0; }
    .battery { width: 18px; height: 9px; border: 1.5px solid #111; border-radius: 2px; position: relative; }
    .battery::after { content: ""; position: absolute; right: -3px; top: 2px; width: 2px; height: 4px; background: #111; border-radius: 1px; }

    .nav {
      height: 52px;
      display: grid;
      grid-template-columns: 48px 1fr 92px;
      align-items: center;
      padding: 0 12px;
      background: #fff;
      border-bottom: 1px solid rgba(229, 230, 235, 0.72);
      position: relative;
      z-index: 5;
    }

    .back {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      background: transparent;
      position: relative;
      border-radius: 50%;
    }

    .back::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 15px;
      width: 10px;
      height: 10px;
      border-left: 2px solid var(--color-text-2);
      border-bottom: 2px solid var(--color-text-2);
      transform: rotate(45deg);
    }

    .nav-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .capsule {
      justify-self: end;
      width: 78px;
      height: 30px;
      border: 1px solid var(--color-border-1);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      color: #111;
      background: rgba(255, 255, 255, 0.86);
    }

    .capsule-dot { font-size: 17px; line-height: 1; transform: translateY(-1px); }
    .capsule-circle { width: 16px; height: 16px; border: 2px solid #111; border-radius: 50%; position: relative; }
    .capsule-circle::after { content: ""; position: absolute; inset: 3px; border-radius: 50%; background: #111; }

    .page {
      position: absolute;
      inset: 88px 0 0;
      display: none;
      flex-direction: column;
      background: var(--color-fill-1);
    }

    .page.active { display: flex; }

    .scroll {
      flex: 1;
      overflow: auto;
      padding-bottom: 96px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scroll::-webkit-scrollbar { display: none; }

    .balance-hero {
      position: relative;
      height: 214px;
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 255, 255, 0.38), transparent 42%),
        radial-gradient(circle at 12% 88%, rgba(255, 255, 255, 0.12), transparent 38%),
        linear-gradient(155deg, #0e42d2 0%, #165dff 38%, #4080ff 72%, #6aa3ff 100%);
      color: #fff;
      padding: 26px 24px 0;
      overflow: hidden;
    }

    .balance-hero::before,
    .balance-hero::after {
      content: "";
      position: absolute;
      left: -40px;
      right: -40px;
      height: 62px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      bottom: 22px;
      transform: rotate(2deg);
      pointer-events: none;
    }

    .balance-hero::after {
      height: 76px;
      background: #fff;
      bottom: -34px;
      opacity: 0.96;
      transform: rotate(-2deg);
    }

    .rule-link {
      position: absolute;
      right: 22px;
      top: 28px;
      color: rgba(255,255,255,0.92);
      background: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      z-index: 2;
    }

    .money-main {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-top: 48px;
      font-size: 34px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-family: Menlo, Consolas, "Courier New", monospace;
    }

    .money-label {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-top: 12px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
    }

    .content-card {
      background: #fff;
      border-radius: 18px 18px 0 0;
      margin-top: -18px;
      position: relative;
      z-index: 3;
      min-height: 480px;
      padding: 22px 18px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .flow-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(229,230,235,0.72);
    }

    .flow-item:last-child { border-bottom: none; }
    .flow-title { font-size: 15px; font-weight: 600; display: flex; align-items: baseline; gap: 8px; }
    .flow-order { color: var(--color-text-3); font-size: 12px; font-weight: 400; }
    .flow-time { margin-top: 8px; font-size: 12px; color: var(--color-text-3); }
    .flow-amount { align-self: center; font-size: 17px; font-weight: 600; font-family: Menlo, Consolas, monospace; }
    .flow-amount.pos { color: var(--color-success-6); }
    .flow-amount.neg { color: var(--color-danger-6); }

    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 18px calc(22px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(255,255,255,0.12), #fff 28%);
      z-index: 8;
    }

    .primary-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      background: var(--color-primary-6);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(22, 93, 255, 0.22);
    }

    .primary-btn:hover:not(:disabled) {
      background: #4080ff;
    }

    .primary-btn:active:not(:disabled) {
      background: #0e42d2;
    }

    .primary-btn:disabled {
      background: #c9cdd4;
      color: #fff;
      box-shadow: none;
      cursor: not-allowed;
    }

    .recharge-page .scroll { padding: 14px 16px 144px; }
    .balance-summary {
      padding: 14px 16px;
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      border: 1px solid rgba(229,230,235,0.7);
    }

    .summary-label { color: var(--color-text-2); font-size: 13px; }
    .summary-value { font-weight: 700; font-family: Menlo, Consolas, monospace; font-size: 18px; }

    .recharge-balance-lbl {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-1);
      text-align: left;
      line-height: 1.35;
    }

    .recharge-balance-amt {
      font-size: 18px;
      font-weight: 600;
      font-family: Menlo, Consolas, "Courier New", monospace;
      color: var(--color-text-1);
      text-align: right;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }

    .panel {
      background: #fff;
      border: 1px solid rgba(229,230,235,0.78);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(29,33,41,0.04);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tier-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .tier {
      min-height: 92px;
      border: 1px solid var(--color-border-1);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      text-align: left;
      position: relative;
      transition: 0.18s;
    }

    .tier.selected {
      border-color: var(--color-primary-6);
      background: var(--color-primary-1);
      box-shadow: 0 0 0 1px rgba(22, 93, 255, 0.12), 0 8px 18px rgba(22, 93, 255, 0.08);
    }

    .tier.selected::after {
      content: "✓";
      position: absolute;
      top: 0;
      right: 0;
      width: 26px;
      height: 22px;
      border-radius: 0 13px 0 13px;
      background: var(--color-primary-6);
      color: #fff;
      font-size: 13px;
      text-align: center;
      line-height: 22px;
    }

    .tier-amount { font-size: 20px; font-weight: 700; font-family: Menlo, Consolas, monospace; }
    .tier-gift { margin-top: 10px; font-size: 13px; font-weight: 600; line-height: 1.35; }
    .tier-gift--yes { color: var(--color-warning-6); }
    .tier-gift--no { color: var(--color-text-1); }

    .custom-input {
      display: flex;
      align-items: center;
      height: 44px;
      border: 1px solid var(--color-border-1);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
    }

    .custom-input:focus-within { border-color: var(--color-primary-6); box-shadow: 0 0 0 3px rgba(22,93,255,0.08); }
    .custom-input span { color: var(--color-text-1); font-weight: 600; }
    .custom-input input { flex: 1; border: none; outline: none; font-size: 17px; padding-left: 8px; min-width: 0; }

    .gift-card {
      background: linear-gradient(135deg, #fff7f2, #fff);
      border: 1px solid rgba(255, 125, 0, 0.18);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .coupon-badge {
      width: 56px;
      min-width: 56px;
      height: 48px;
      border-radius: 12px;
      background: #fff1e8;
      color: var(--wallet-orange);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Menlo, Consolas, monospace;
    }

    .gift-name { font-size: 14px; font-weight: 600; }
    .gift-meta { color: var(--color-text-3); font-size: 12px; line-height: 1.6; margin-top: 4px; }

    .pay-row, .tip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      font-size: 14px;
    }

    .wechat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .wechat-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #07c160;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .service-phone {
      color: var(--color-primary-6);
      font-weight: 600;
      background: var(--color-primary-1);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .agreement {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--color-text-2);
      font-size: 12px;
      line-height: 1.5;
      cursor: pointer;
      user-select: none;
    }

    .check {
      width: 18px;
      height: 18px;
      margin-top: 1px;
      border: 1px solid var(--color-border-1);
      border-radius: 50%;
      background: #fff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .check.checked {
      border-color: var(--color-primary-6);
      background: var(--color-primary-6);
    }

    .check:not(.checked) { color: transparent; }

    .link { color: var(--color-primary-6); background: transparent; padding: 0; }

    .pay-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      padding: 10px 16px calc(22px + env(safe-area-inset-bottom, 0px));
      background: #fff;
      border-top: 1px solid var(--color-border-1);
    }

    .pay-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--color-text-2);
    }

    .pay-summary-recharge {
      color: var(--color-text-1);
      font-size: 14px;
      font-weight: 500;
    }

    .recharge-page .panel-title { margin-bottom: 12px; }

    .recharge-page .panel-title .summary-label { display: none; }

    .recharge-tip-body p {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--color-text-1);
      line-height: 1.65;
    }

    .recharge-tip-body p:last-of-type { margin-bottom: 0; }

    .recharge-tip-body .cs-link-tip {
      display: inline;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      color: var(--color-primary-6);
      font-size: inherit;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
      vertical-align: baseline;
    }

    .recharge-tip-body .cs-link-tip:active {
      color: #0e42d2;
    }

    .custom-hint-error {
      margin-top: 10px;
      font-size: 13px;
      color: var(--color-danger-6);
      line-height: 1.45;
    }

    .custom-hint-tip {
      margin-top: 10px;
      font-size: 13px;
      color: var(--color-text-2);
      line-height: 1.45;
    }

    .pay-method-panel.panel {
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .pay-method-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 6px 0;
      font-size: 15px;
      color: var(--color-text-2);
    }

    .pay-method-label {
      color: var(--color-text-2);
      font-weight: 400;
    }

    .pay-method-value {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      color: var(--color-text-2);
      font-weight: 400;
    }

    .pay-method-chevron {
      color: var(--color-text-3);
      font-size: 16px;
      line-height: 1;
      margin-left: 2px;
    }

    .gift-list-v2 { display: flex; flex-direction: column; gap: 12px; }

    .gift-card-v2 {
      border: 1px solid var(--color-border-1);
      border-radius: 12px;
      padding: 14px 16px;
      background: var(--color-bg-1);
    }

    .gift-card-v2-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-1);
      line-height: 1.45;
    }

    .gift-card-v2-sep {
      height: 1px;
      background: var(--color-border-1);
      margin: 12px 0 4px;
    }

    .gift-v2-rows { display: flex; flex-direction: column; }

    .gift-v2-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
    }

    .gift-v2-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .gift-v2-row-lbl {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-1);
      line-height: 1.5;
      text-align: left;
    }

    .gift-v2-row-val {
      flex: 1;
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-1);
      line-height: 1.5;
      text-align: right;
      word-break: break-word;
    }

    .gift-empty-state {
      text-align: center;
      padding: 18px 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-1);
    }

    .recharge-page .agreement {
      color: var(--color-text-1);
      font-size: 14px;
    }

    .pay-amount { color: var(--color-primary-6); font-size: 18px; font-weight: 700; font-family: Menlo, Consolas, monospace; }

    .result-wrap {
      flex: 1;
      padding: 72px 24px 0;
      text-align: center;
      background: #fff;
    }

    .result-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(0, 180, 42, 0.1);
      color: var(--color-success-6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
    }

    .result-icon.processing { background: rgba(255,125,0,0.1); color: var(--color-warning-6); }
    .result-icon.fail { background: rgba(245,63,63,0.1); color: var(--color-danger-6); }
    .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .result-desc { color: var(--color-text-2); font-size: 14px; line-height: 1.6; }

    .result-card {
      margin-top: 24px;
      padding: 16px;
      background: var(--color-fill-1);
      border-radius: var(--radius-md);
      text-align: left;
    }

    .kv {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      color: var(--color-text-2);
      font-size: 13px;
    }
    .kv strong { color: var(--color-text-1); font-weight: 600; }

    .empty, .error, .disabled-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--color-text-2);
    }

    .empty-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: var(--color-fill-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-3);
      font-size: 24px;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 116px;
      transform: translateX(-50%) translateY(-10px);
      max-width: 280px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(29,33,41,0.88);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: 0.18s;
      text-align: center;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(29,33,41,0.46);
      z-index: 40;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-mask.show { display: flex; }

    .sheet {
      width: 100%;
      max-height: 76%;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 18px 18px 24px;
      box-shadow: var(--shadow-popup);
      animation: rise 0.18s ease;
    }

    @keyframes rise {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 600;
    }

    .close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-fill-2);
      color: var(--color-text-2);
      font-size: 18px;
    }

    .sheet-body {
      max-height: 520px;
      overflow: auto;
      color: var(--color-text-2);
      font-size: 14px;
      line-height: 1.75;
    }

    .sheet-body h4 { color: var(--color-text-1); margin: 14px 0 6px; }
    .sheet-body p { margin: 0 0 10px; }

    .proto-btn {
      min-height: 40px;

      background: linear-gradient(90deg, var(--color-fill-2) 25%, var(--color-fill-1) 37%, var(--color-fill-2) 63%);

      animation: sk 1.2s ease-in-out infinite;
      border-radius: 6px;

  <script>
    (function () {
      var WALLET_BALANCE = 1000;

      var state = {
        page: "balance",
        rechargeEnabled: true,
        flowsEmpty: false,
        configError: false,
        tiersEmpty: false,
        customTierEnabled: true,
        customMin: 10,
        customMax: null,
        selectedTier: "t2",
        customAmount: "",
        agreed: false,
        result: "success",
        p01Loading: false,
        p01Error: false,
        p02Loading: false,
        lastPayAmount: 100,
        giftIssue: "ok",
        protoOpen: false
      };

      var tierCatalog = [
        { id: "t1", type: "fixed", amount: 50, title: "¥50", gifts: [] },
        {
          id: "t2",
          type: "fixed",
          amount: 100,
          title: "¥100",
          gifts: [
            {
              title: "汽车保养优惠券",
              business: "汽车保养",
              valid: "领取当日起 7 天有效",
              qty: "1 张"
            }
          ]
        },
        {
          id: "t3",
          type: "fixed",
          amount: 300,
          title: "¥300",
          gifts: [
            {
              title: "汽车美容优惠券",
              business: "汽车美容",
              valid: "领取当日起 15 天有效",
              qty: "2 张"
            }
          ]
        },
        { id: "custom", type: "custom", amount: 0, title: "自定义金额", gifts: [] }
      ];

      var flows = [
        { title: "订单支付", order: "202601011404001", time: "2026-01-01 12:00", amount: "-10.00", type: "neg" },
        { title: "订单支付", order: "202601011404002", time: "2026-01-01 12:00", amount: "-10.00", type: "neg" },
        { title: "钱包充值", order: "REC202601010001", time: "2026-01-01 12:00", amount: "+10.00", type: "pos" },
        { title: "订单退款", order: "202601011404002", time: "2026-01-01 12:00", amount: "+10.00", type: "pos" },
        { title: "订单支付", order: "202508141404001", time: "2026-01-01 12:00", amount: "-10.00", type: "neg" },
        { title: "钱包充值", order: "REC202508140002", time: "2026-01-01 12:00", amount: "+10.00", type: "pos" },
        { title: "订单退款", order: "202508141404001", time: "2026-01-01 12:00", amount: "+10.00", type: "pos" }
      ];

      var el = {
        navTitle: document.getElementById("navTitle"),
        backBtn: document.getElementById("backBtn"),
        balance: document.getElementById("pageBalance"),
        recharge: document.getElementById("pageRecharge"),
        result: document.getElementById("pageResult"),
        flowContent: document.getElementById("flowContent"),
        heroBalance: document.getElementById("heroBalance"),
        balanceRule: document.getElementById("balanceRule"),
        rechargeBtn: document.getElementById("rechargeBtn"),
        tierSlot: document.getElementById("tierSlot"),
        customPanel: document.getElementById("customPanel"),
        customAmount: document.getElementById("customAmount"),
        customHintTip: document.getElementById("customHintTip"),
        customHint: document.getElementById("customHint"),
        giftPanel: document.getElementById("giftPanel"),
        giftPreview: document.getElementById("giftPreview"),
        agreementCheck: document.getElementById("agreementCheck"),
        agreementLink: document.getElementById("agreementLink"),
        checkIcon: document.getElementById("checkIcon"),
        csLinkRecharge: document.getElementById("csLinkRecharge"),
        payAmount: document.getElementById("payAmount"),
        payBtn: document.getElementById("payBtn"),
        resultContent: document.getElementById("resultContent"),
        resultBack: document.getElementById("resultBack"),
        resultCoupons: document.getElementById("resultCoupons"),
        rechargeBalanceValue: document.getElementById("rechargeBalanceValue"),
        rechargeLockBanner: document.getElementById("rechargeLockBanner"),
        modalMask: document.getElementById("modalMask"),
        sheetTitle: document.getElementById("sheetTitle"),
        sheetBody: document.getElementById("sheetBody"),
        sheetClose: document.getElementById("sheetClose"),
        toast: document.getElementById("toast"),
        protoFab: document.getElementById("protoFab"),
        protoOverlay: document.getElementById("protoOverlay"),
        protoDrawer: document.getElementById("protoDrawer"),
        protoClose: document.getElementById("protoClose"),
        protoReset: document.getElementById("protoReset")
      };

      function showToast(text) {
        el.toast.textContent = text;
        el.toast.classList.add("show");
        setTimeout(function () {
          el.toast.classList.remove("show");
        }, 2000);
      }

      function money(value) {
        return "¥ " + Number(value || 0).toFixed(2);
      }

      function moneyPlain(value) {
        return "¥ " + Number(value || 0).toFixed(2);
      }

      function getVisibleTiers() {
        if (state.tiersEmpty) return [];
        return tierCatalog.filter(function (t) {
          return t.type === "fixed" || (t.type === "custom" && state.customTierEnabled);
        });
      }

      function ensureTierSelection() {
        var list = getVisibleTiers();
        if (!list.length) {
          state.selectedTier = "";
          return;
        }
        if (!list.some(function (t) {
          return t.id === state.selectedTier;
        })) {
          var firstFixed = list.find(function (t) {
            return t.type === "fixed";
          });
          state.selectedTier = firstFixed ? firstFixed.id : list[0].id;
        }
      }

      function getTierById(id) {
        return tierCatalog.find(function (t) {
          return t.id === id;
        });
      }

      function currentAmount() {
        var tier = getTierById(state.selectedTier);
        if (!tier) return 0;
        if (tier.type === "custom") return Number(state.customAmount || 0);
        return tier.amount;
      }

      function giftsForCustomAmount(amount) {
        if (!(amount > 0)) return [];
        if (amount >= 300) return tierCatalog[2].gifts.slice();
        if (amount >= 100) return tierCatalog[1].gifts.slice();
        return [];
      }

      function currentGifts() {
        var tier = getTierById(state.selectedTier);
        if (!tier) return [];
        if (tier.type === "fixed") return (tier.gifts || []).slice();
        return giftsForCustomAmount(currentAmount());
      }

      function customAmountError() {
        var tier = getTierById(state.selectedTier);
        if (!tier || tier.type !== "custom") return "";
        var raw = String(state.customAmount || "").trim();
        if (!raw) return "";
        var n = Number(raw);
        if (!isFinite(n) || n <= 0) return "请输入大于 0 的合法金额";
        if (state.customMin != null && n < state.customMin) {
          return "充值金额不能低于 " + moneyPlain(state.customMin);
        }
        if (state.customMax != null && n > state.customMax) {
          return "充值金额不能高于 " + moneyPlain(state.customMax);
        }
        return "";
      }

      function isPayableAmount() {
        var tier = getTierById(state.selectedTier);
        if (!tier) return false;
        if (tier.type === "custom") {
          var raw = String(state.customAmount || "").trim();
          if (!raw) return false;
          return !customAmountError();
        }
        return tier.amount > 0;
      }

      function renderHero() {
        if (state.p01Loading) {
          el.heroBalance.className = "money-main skeleton is-skeleton";
          el.heroBalance.textContent = "";
          return;
        }
        el.heroBalance.className = "money-main";
        el.heroBalance.textContent = state.p01Error ? "--" : moneyPlain(WALLET_BALANCE);
      }

      function renderFlows() {
        if (state.p01Loading) {
          el.flowContent.innerHTML =
            '<div class="section-title">余额明细</div>' +
            '<div class="flow-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line short" style="margin-left:auto;width:72px"></div></div>' +
            '<div class="flow-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line short" style="margin-left:auto;width:72px"></div></div>' +
            '<div class="flow-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line short" style="margin-left:auto;width:72px"></div></div>';
          return;
        }
        if (state.p01Error) {
          el.flowContent.innerHTML =

      function setProtoOpen(open) {
        state.protoOpen = !!open;
        el.protoOverlay.setAttribute("data-proto-open", state.protoOpen ? "true" : "false");
        el.protoOverlay.setAttribute("aria-hidden", state.protoOpen ? "false" : "true");
        if (state.protoOpen) {
          setTimeout(function () {
            try {
              el.protoDrawer.focus();
            } catch (e) {}
          }, 0);
        }
      }

      function applyProtoSet(spec) {
        if (!spec) return;
        var pair = String(spec).split(":");
        var key = pair[0];
        var val = pair.slice(1).join(":");
        if (key === "rechargeEnabled") state.rechargeEnabled = val === "true";
        if (key === "customTierEnabled") state.customTierEnabled = val === "true";
        if (key === "tiersEmpty") state.tiersEmpty = val === "true";
        if (key === "configError") state.configError = val === "true";
        if (key === "flowsEmpty") state.flowsEmpty = val === "true";
        if (key === "customMax") state.customMax = val === "null" || val === "" ? null : Number(val);
        ensureTierSelection();
      }

      function syncProtoUi() {
        document.getElementById("protoRechargeOn").classList.toggle("active", state.rechargeEnabled);
        document.getElementById("protoRechargeOff").classList.toggle("active", !state.rechargeEnabled);
        document.getElementById("protoCustomOn").classList.toggle("active", state.customTierEnabled);
        document.getElementById("protoCustomOff").classList.toggle("active", !state.customTierEnabled);
        document.getElementById("protoTiersEmpty").classList.toggle("active", state.tiersEmpty);
        document.getElementById("protoTiersOk").classList.toggle("active", !state.tiersEmpty);
        document.getElementById("protoConfigErr").classList.toggle("active", state.configError);
        document.getElementById("protoConfigOk").classList.toggle("active", !state.configError);
        document.getElementById("protoP01Loading").classList.toggle("active", state.p01Loading);
        document.getElementById("protoP01Error").classList.toggle("active", state.p01Error);
        document.getElementById("protoP02Loading").classList.toggle("active", state.p02Loading);
        document.getElementById("protoFlowsEmpty").classList.toggle("active", state.flowsEmpty);
        document.getElementById("protoFlowsNormal").classList.toggle("active", !state.flowsEmpty);
        document.getElementById("protoMaxUnlimited").classList.toggle("active", state.customMax == null);
        document.getElementById("protoMax5000").classList.toggle("active", state.customMax != null);
        document.getElementById("protoGiftOk").classList.toggle("active", state.giftIssue === "ok");
        document.getElementById("protoGiftPending").classList.toggle("active", state.giftIssue === "pending");
        document.getElementById("protoGiftFail").classList.toggle("active", state.giftIssue === "fail");
      }

          showToast("充值功能暂不可用，请稍后再试");
          return;
        }
        if (state.configError || state.p02Loading || !getVisibleTiers().length) return;
        if (!state.agreed) {
          showToast("请先阅读并同意充值协议");
          return;
        }
        if (!isPayableAmount()) return;
        state.lastPayAmount = currentAmount();
        state.result = "success";

        setPage("result");

      document.addEventListener("click", function (event) {
        var tierBtn = event.target.closest("[data-tier]");
        if (tierBtn && state.page === "recharge" && el.recharge.contains(tierBtn)) {
          state.selectedTier = tierBtn.getAttribute("data-tier");
          if (state.selectedTier !== "custom") state.customAmount = "";
          el.customAmount.value = state.customAmount;
          renderRecharge();
        }

        var pageBtn = event.target.closest("[data-proto-page]");
        if (pageBtn) {
          setPage(pageBtn.getAttribute("data-proto-page"));
          return;
        }
        var resultBtn = event.target.closest("[data-proto-result]");
        if (resultBtn) {
          state.result = resultBtn.getAttribute("data-proto-result");
          if (state.result === "success") state.lastPayAmount = currentAmount() || 100;
          setPage("result");
          return;
        }

        var giftBtn = event.target.closest("[data-proto-gift]");
        if (giftBtn) {
          state.giftIssue = giftBtn.getAttribute("data-proto-gift");
          syncProtoUi();
          if (state.page === "result" && state.result === "success") renderResult("success");
          return;
        }

        var setBtn = event.target.closest("[data-proto-set]");
        if (setBtn) {
          applyProtoSet(setBtn.getAttribute("data-proto-set"));
          renderBalance();
          if (state.page === "recharge") renderRecharge();
          syncProtoUi();
          return;
        }

        var flagBtn = event.target.closest("[data-proto-flag]");
        if (flagBtn) {
          var f = flagBtn.getAttribute("data-proto-flag");
          if (f === "p01Loading") state.p01Loading = !state.p01Loading;
          if (f === "p01Error") state.p01Error = !state.p01Error;
          if (f === "p02Loading") state.p02Loading = !state.p02Loading;
          if (f === "p01Error" && state.p01Error) state.p01Loading = false;
          if (f === "p01Loading" && state.p01Loading) state.p01Error = false;
          renderBalance();
          if (state.page === "recharge") renderRecharge();
          syncProtoUi();
        }
      });

        state.result = "success";

        syncProtoUi();
      };

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          if (state.protoOpen) setProtoOpen(false);
          else if (el.modalMask.classList.contains("show")) closeSheet();
        }
      });

      var protoRefreshBtn = document.querySelector("[data-proto-demo=\"refreshBalance\"]");
      if (protoRefreshBtn) {
        protoRefreshBtn.onclick = function () {
          showToast("已刷新余额与明细（原型示意）");
        };
      }

      syncProtoUi();
      renderBalance();
      renderRecharge();
    })();
  </script>
</body>
</html>
